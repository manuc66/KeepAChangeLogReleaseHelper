name: Release
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only (preview without making changes)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'chore: release')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install ChangeSharp
        run: dotnet tool install --global ChangeSharp.Cli

      - name: Validate Release
        run: changesharp validate --require-fragments

      - name: Dry Run Preview
        run: changesharp release --dry-run

      - name: Perform Release
        if: inputs.dry_run == 'false'
        run: |
          NEXT_VERSION=$(changesharp status --next-only)
          changesharp release
          
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "chore: release $NEXT_VERSION"
          git push
          git tag v$NEXT_VERSION
          git push --tags
