name: ChangeSharp Bot
on:
  pull_request:
    branches: [ main ]

jobs:
  check-fragments:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install ChangeSharp
        run: dotnet tool install --global ChangeSharp.Cli

      - name: Validate Fragments
        id: validate
        continue-on-error: true
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          changesharp validate --require-fragments
        
      - name: Post PR Comment
        if: steps.validate.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### ⚠️ Missing Change Fragments
            
            This Pull Request does not contain any change fragments in \`.changesharp/unreleased/\`.
            
            To fix this, please run:
            \`\`\`bash
            changesharp new
            \`\`\`
            and commit the generated file. This ensures your changes are included in the next release and the version bump is correctly calculated.`
            })
